openapi: 3.0.3
info:
  title: Workout REST API
  version: 1.0.0
  description: REST API voor exercises, workouts, workout logs en users.
servers:
  - url: https://workout-api-ryan-ace2grfeheaxbtf7.francecentral-01.azurewebsites.net
    description: Azure production server
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Exercises
  - name: Workouts
  - name: Workout Logs
paths:
  /api/exercises:
    get:
      summary: Get all exercises
      tags:
        - Exercises
      responses:
        "200":
          description: List of exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"
        "500":
          description: Unexpected server error
components:
  securitySchemes:
    ApiTokenAuth:
      type: apiKey
      in: header
      name: x-auth-token
      description: JWT token returned by register/login.

  parameters:
    id:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId
      schema:
        $ref: "#/components/schemas/ObjectId"
      example: 665f1e5a9a2f1a0012b34567

  responses:
    BadRequest:
      description: Invalid input or invalid ObjectId
      content:
        text/plain:
          schema:
            type: string
          example: ongeldige exercise id
    Unauthorized:
      description: Missing authentication token
      content:
        text/plain:
          schema:
            type: string
          example: Access denied. No token provided.
    Forbidden:
      description: Authenticated user is not an admin
      content:
        text/plain:
          schema:
            type: string
          example: Access denied.
    NotFound:
      description: Requested resource was not found
      content:
        text/plain:
          schema:
            type: string
          example: exercise niet gevonden
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ObjectId:
      type: string
      pattern: "^[a-fA-F0-9]{24}$"
      example: 665f1e5a9a2f1a0012b34567

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Something failed.
        details:
          type: string
          example: Error details are only shown in development.

    ExerciseInput:
      type: object
      required:
        - name
        - muscleGroup
        - equipment
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Bench Press
        muscleGroup:
          type: string
          enum:
            - chest
            - back
            - legs
            - shoulders
            - arms
            - core
            - full body
          example: chest
        equipment:
          type: string
          enum:
            - barbell
            - dumbbell
            - machine
            - bodyweight
            - cable
            - kettlebell
          example: barbell

    Exercise:
      allOf:
        - $ref: "#/components/schemas/ExerciseInput"
        - type: object
          required:
            - _id
          properties:
            _id:
              $ref: "#/components/schemas/ObjectId"
            createdAt:
              type: string
              format: date-time
              example: 2026-06-06T12:00:00.000Z
